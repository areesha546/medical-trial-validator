# Areesha Anum - Centrala University Medical Trial Data Validation System
# Docker Compose configuration

version: '3.8'

services:
  # Main web application
  web:
    build: .
    container_name: medical-trial-validator
    ports:
      - "5000:5000"
    environment:
      - FTP_HOST=ftp-server
      - FTP_PORT=2121
      - FTP_USERNAME=centrala
      - FTP_PASSWORD=medical2024
      - FTP_REMOTE_DIR=/
      - FLASK_DEBUG=false
      - FLASK_PORT=5000
      - FLASK_SECRET_KEY=docker-secret-key-change-in-production
      - DATABASE_PATH=data/tracker.db
      - GUID_API_URL=https://www.uuidtools.com/api/generate/v1
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    depends_on:
      - ftp-server
    restart: unless-stopped
    networks:
      - app-network

  # Test FTP server
  ftp-server:
    build: .
    container_name: medical-trial-ftp
    command: python scripts/start_test_ftp.py
    ports:
      - "2121:2121"
      - "60000-60010:60000-60010"
    environment:
      - FTP_HOST=0.0.0.0
      - FTP_PORT=2121
    restart: unless-stopped
    networks:
      - app-network

volumes:
  app-data:
  app-logs:

networks:
  app-network:
    driver: bridge

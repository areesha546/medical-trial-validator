# Areesha Anum - Centrala University Medical Trial Data Validation System
# GitHub Actions CI/CD Pipeline

name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/downloads data/archive data/rejected data/sample_files logs/errors

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Generate sample data
        run: |
          python scripts/generate_sample_data.py

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/downloads data/archive data/rejected data/sample_files logs/errors

      - name: Check syntax
        run: |
          python -m py_compile app/config.py
          python -m py_compile app/models.py
          python -m py_compile app/validator.py
          python -m py_compile app/ftp_service.py
          python -m py_compile app/file_tracker.py
          python -m py_compile app/archive_service.py
          python -m py_compile app/error_logger.py
          python -m py_compile app/guid_service.py

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t medical-trial-validator .

      - name: Verify Docker image
        run: |
          docker images medical-trial-validator
